<script>
    // ── Coordinate constants (jenter15 – derived from SVG axis-tick analysis) ─────
    // Chart covers age 1–5 years = 12–60 months
    // X-axis: SVG coords (same transform as chart SVG: coordinates are in SVG pts)
    // Year 1 (12 months) → x_svg = 54, Year 5 (60 months) → x_svg = 541.28
    const J15_X_ORIGIN   = 54;       // x_svg at 12 months
    const J15_PX_PER_MO  = 10.152;   // px per month in SVG pt units

    // Weight: 7 kg → y_svg = 774.88, scale 15.97 px/kg (y decreases as kg increases)
    const J15_WT_Y_AT_7  = 774.88;
    const J15_WT_PX_PER_KG = 15.97;

    // Height: 68 cm → y_svg = 647.16, scale 7.98 px/cm
    const J15_HT_Y_AT_68  = 647.16;
    const J15_HT_PX_PER_CM = 7.98;

    // Head circ: 42 cm → y_svg = 264.35, scale 15.95 px/cm
    const J15_HC_Y_AT_42  = 264.35;
    const J15_HC_PX_PER_CM = 15.95;

    function j15_ageToX(months)    { return J15_X_ORIGIN  + (months - 12) * J15_PX_PER_MO; }
    function j15_weightToY(kg)     { return J15_WT_Y_AT_7  - (kg - 7)    * J15_WT_PX_PER_KG; }
    function j15_heightToY(cm)     { return J15_HT_Y_AT_68 - (cm - 68)   * J15_HT_PX_PER_CM; }
    function j15_headCircToY(cm)   { return J15_HC_Y_AT_42 - (cm - 42)   * J15_HC_PX_PER_CM; }

    // ── Data stores ──────────────────────────────────────────────────────────────
    let j15_weightData   = [];
    let j15_heightData   = [];
    let j15_headCircData = [];

    // ── Generic redraw ───────────────────────────────────────────────────────────
    function j15_redraw(groupId, data, toY, color, unit) {
        const ns    = 'http://www.w3.org/2000/svg';
        const group = document.getElementById(groupId);
        while (group.firstChild) group.removeChild(group.firstChild);

        const sorted = [...data].sort((a, b) => a.ageMonths - b.ageMonths);

        for (let i = 1; i < sorted.length; i++) {
            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', j15_ageToX(sorted[i-1].ageMonths).toFixed(1));
            line.setAttribute('y1', toY(sorted[i-1].value).toFixed(1));
            line.setAttribute('x2', j15_ageToX(sorted[i].ageMonths).toFixed(1));
            line.setAttribute('y2', toY(sorted[i].value).toFixed(1));
            line.setAttribute('style', `stroke:${color};stroke-width:1.5`);
            group.appendChild(line);
        }

        for (const pt of sorted) {
            const x     = j15_ageToX(pt.ageMonths).toFixed(1);
            const y     = toY(pt.value).toFixed(1);
            const yrStr = Math.floor(pt.ageMonths / 12) + 'å ' + (pt.ageMonths % 12) + 'mnd';
            const label = pt.value.toFixed(1).replace('.', ',') + ' ' + unit + '  (' + yrStr + ')';
            const circle = document.createElementNS(ns, 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', '4');
            circle.setAttribute('fill', color);
            circle.setAttribute('style', 'cursor:crosshair');
            circle.addEventListener('mousemove', (evt) => j15_showTooltip(evt, label));
            circle.addEventListener('mouseout', j15_hideTooltip);
            group.appendChild(circle);
        }
    }

    // ── Generic list updater ─────────────────────────────────────────────────────
    function j15_updateList(listId, data, unit) {
        const el = document.getElementById(listId);
        if (data.length === 0) { el.innerHTML = ''; return; }
        const sorted = [...data].sort((a, b) => a.ageMonths - b.ageMonths);
        el.innerHTML = '<strong>Registreringer:</strong><ul style="margin:4px 0;padding-left:16px;">' +
            sorted.map(p => {
                const yr = Math.floor(p.ageMonths / 12);
                const mo = p.ageMonths % 12;
                return `<li>${yr}å ${mo}mnd: ${p.value.toFixed(1).replace('.', ',')} ${unit}</li>`;
            }).join('') + '</ul>';
    }

    // ── Form helpers ─────────────────────────────────────────────────────────────
    function j15_makeHandler(formId, ageId, valId, store, groupId, toY, color, unit, listId, minVal, maxVal) {
        document.getElementById(formId).addEventListener('submit', function(e) {
            e.preventDefault();
            const age = parseFloat(document.getElementById(ageId).value);
            const val = parseFloat(document.getElementById(valId).value);
            if (isNaN(age) || isNaN(val)) return;
            if (age < 12 || age > 60 || val < minVal || val > maxVal) return;
            store.push({ ageMonths: age, value: val });
            j15_redraw(groupId, store, toY, color, unit);
            j15_updateList(listId, store, unit);
            j15_redrawTable();
            document.getElementById(ageId).value = '';
            document.getElementById(valId).value = '';
        });
    }

    // ── Table (lower-right area) ──────────────────────────────────────────────────
    // Coordinates derived from SVG analysis of jenter15 chart:
    // Table outer box: x=384.19–567.95, y=710.80–818.61
    // 4 columns: alder, vekt, høyde, hodeomkrets
    // Column centers (SVG pts): 407.16, 453.10, 499.04, 544.98
    // Header row already printed in chart at y≈720
    // Data rows: first center y=731.0, pitch=13.47, max 8 rows
    const J15_TABLE_COLS_X  = [407.16, 453.10, 499.04, 544.98];
    const J15_TABLE_ROW0_Y  = 731.0;
    const J15_TABLE_ROW_H   = 13.47;
    const J15_TABLE_MAX_ROWS = 8;

    function j15_redrawTable() {
        const ns    = 'http://www.w3.org/2000/svg';
        const group = document.getElementById('j15-table-data');
        while (group.firstChild) group.removeChild(group.firstChild);

        // Merge all data stores into one map keyed by ageMonths
        const byAge = {};
        for (const pt of j15_weightData)   { (byAge[pt.ageMonths] = byAge[pt.ageMonths] || {}).weight   = pt.value; }
        for (const pt of j15_heightData)   { (byAge[pt.ageMonths] = byAge[pt.ageMonths] || {}).height   = pt.value; }
        for (const pt of j15_headCircData) { (byAge[pt.ageMonths] = byAge[pt.ageMonths] || {}).headCirc = pt.value; }

        const ages = Object.keys(byAge).map(Number).sort((a, b) => a - b);

        ages.slice(0, J15_TABLE_MAX_ROWS).forEach((age, i) => {
            const y   = J15_TABLE_ROW0_Y + i * J15_TABLE_ROW_H;
            const row = byAge[age];
            const yr  = Math.floor(age / 12);
            const mo  = age % 12;

            function cell(text, colIdx) {
                const t = document.createElementNS(ns, 'text');
                t.setAttribute('x', J15_TABLE_COLS_X[colIdx]);
                t.setAttribute('y', y.toFixed(1));
                t.setAttribute('font-family', 'sans-serif');
                t.setAttribute('font-size', '5');
                t.setAttribute('fill', '#111');
                t.setAttribute('text-anchor', 'middle');
                t.setAttribute('dominant-baseline', 'middle');
                t.textContent = text;
                return t;
            }

            const ageLabel = yr + 'å' + (mo ? ' ' + mo + 'mnd' : '');
            group.appendChild(cell(ageLabel, 0));
            if (row.weight   != null) group.appendChild(cell(row.weight.toFixed(1).replace('.', ','),   1));
            if (row.height   != null) group.appendChild(cell(row.height.toFixed(1).replace('.', ','),   2));
            if (row.headCirc != null) group.appendChild(cell(row.headCirc.toFixed(1).replace('.', ','), 3));
        });
    }

    j15_makeHandler('j15-height-form',  'j15-age-height',  'j15-val-height',
        j15_heightData,   'j15-height-data',   j15_heightToY,   'rgb(30,100,220)',  'cm', 'j15-height-list',   68, 122);
    j15_makeHandler('j15-weight-form',  'j15-age-weight',  'j15-val-weight',
        j15_weightData,   'j15-weight-data',   j15_weightToY,   'rgb(220,30,30)',    'kg', 'j15-weight-list',    7,  28);
    j15_makeHandler('j15-headcirc-form','j15-age-headcirc','j15-val-headcirc',
        j15_headCircData, 'j15-headcirc-data', j15_headCircToY, 'rgb(30,160,90)',   'cm', 'j15-headcirc-list', 42,  55);

    // ── Patient info ─────────────────────────────────────────────────────────────
    // Patient name box top-left: "Navn" area y_svg≈28, "Født" area y_svg≈56
    document.getElementById('j15-patient-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('j15-patient-name').value.trim();
        const dob  = document.getElementById('j15-patient-dob').value;

        const ns    = 'http://www.w3.org/2000/svg';
        const group = document.getElementById('j15-patient-info');
        while (group.firstChild) group.removeChild(group.firstChild);

        function makeTxt(text, x, y) {
            const t = document.createElementNS(ns, 'text');
            t.setAttribute('x', x);
            t.setAttribute('y', y);
            t.setAttribute('font-family', 'sans-serif');
            t.setAttribute('font-size', '8');
            t.setAttribute('fill', '#111');
            t.textContent = text;
            return t;
        }

        // "Navn" label is at y_svg=26, box divider ~y=44; place name at y=40
        // "Født" label is at y_svg=54.73, box bottom y=77; place dob at y=70
        if (name) group.appendChild(makeTxt(name, 30, 40));
        if (dob) {
            const [yr, mo, day] = dob.split('-');
            group.appendChild(makeTxt(day + '.' + mo + '.' + yr, 30, 70));
        }
    });

    // ── MFH (Midtforeldrehøyde) ──────────────────────────────────────────────────
    // Girls MFH = (father_cm + mother_cm) / 2 - 6.5 cm
    // MFH ±8.5 cm is the normal range
    // We draw a horizontal line segment in the height section for MFH ± range
    document.getElementById('j15-mfh-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const fh = parseFloat(document.getElementById('j15-father-height').value);
        const mh = parseFloat(document.getElementById('j15-mother-height').value);
        if (isNaN(fh) || isNaN(mh)) return;

        const mfh = (fh + mh) / 2 - 6.5;

        document.getElementById('j15-mfh-result').textContent =
            'MFH: ' + mfh.toFixed(1).replace('.', ',') + ' cm';

        // Fill in the three fields in the MFH box on the chart.
        // Box layout (SVG pt coords, from clip-path analysis):
        //   Col 1 "Høyde far": x center = (23.56 + 87.50) / 2 = 55.5
        //   Col 2 "Høyde mor": x center = (87.50 + 152.47) / 2 = 120.0
        //   Col 3 "MFH":       x center = (152.47 + 231.66) / 2 = 192.1
        //   Value row y ≈ 305 (below label at 294.84, above formula text at 315.42)
        const ns    = 'http://www.w3.org/2000/svg';
        const group = document.getElementById('j15-mfh-line');
        while (group.firstChild) group.removeChild(group.firstChild);

        function fieldText(text, cx, y) {
            const t = document.createElementNS(ns, 'text');
            t.setAttribute('x', cx);
            t.setAttribute('y', y);
            t.setAttribute('font-family', 'sans-serif');
            t.setAttribute('font-size', '7');
            t.setAttribute('fill', '#111');
            t.setAttribute('text-anchor', 'middle');
            t.textContent = text;
            return t;
        }

        const Y_FIELD = 306;
        group.appendChild(fieldText(fh.toFixed(1).replace('.', ','), 55.5,  Y_FIELD));
        group.appendChild(fieldText(mh.toFixed(1).replace('.', ','), 120.0, Y_FIELD));
        group.appendChild(fieldText(mfh.toFixed(1).replace('.', ','), 192.1, Y_FIELD));
    });

    // ── Tooltip ──────────────────────────────────────────────────────────────────
    function j15_showTooltip(evt, text) {
        const tooltip = document.getElementById('j15-tooltip');
        tooltip.innerHTML = text;
        tooltip.style.display = 'block';
        tooltip.style.left = evt.pageX + 10 + 'px';
        tooltip.style.top  = evt.pageY + 10 + 'px';
    }
    function j15_hideTooltip() {
        document.getElementById('j15-tooltip').style.display = 'none';
    }
</script>
