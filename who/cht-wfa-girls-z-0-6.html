    <g id="who-patient-info"></g>

<div class="sidebar">

  <!-- Patient info -->
  <h3>Pasient</h3>
  <form id="who-patient-form" style="display:flex;flex-direction:column;gap:8px;">
    <div>
      <label>Navn</label>
      <input type="text" id="who-patient-name" placeholder="Fullt navn">
    </div>
    <div>
      <label>Født</label>
      <input type="date" id="who-patient-dob">
    </div>
    <button type="submit" style="background:#555;">Oppdater</button>
  </form>

  <hr>

  <!-- Weight -->
  <h3 style="color:rgb(220,30,30);">Vekt (kg)</h3>
  <form id="who-weight-form" style="display:flex;flex-direction:column;gap:8px;">
    <div>
      <label>Alder (uker, 0–26)</label>
      <input type="number" id="who-age-weight" min="0" max="26" step="1" placeholder="f.eks. 4">
    </div>
    <div>
      <label>Vekt (kg, 2–10)</label>
      <input type="number" id="who-val-weight" min="2" max="10" step="0.1" placeholder="f.eks. 4,5">
    </div>
    <button type="submit" style="background:rgb(220,30,30);">Legg til</button>
  </form>
  <div id="who-weight-list" style="margin-top:10px;font-size:12px;color:#333;"></div>

</div><!-- end sidebar -->

</div><!-- end chart-card -->
<div id="who-tooltip"></div>

<script>
    // ── Coordinate constants ───────────────────────────────────────────────────
    // SVG: landscape 841.88971 × 595.27557 pt
    // Chart area: x from ~111.13 to ~737.44, y from ~119.78 to ~506.07
    //
    // X-axis: 0–6 months (shown as weeks 0–26)
    //   x_svg = 111.130 + weeks × 23.226
    //   (Month gridlines at months 3–6: x = 413.071, 513.716, 614.360, 715.011)
    //
    // Y-axis (weight): 2–10 kg, step 1 kg
    //   y_svg = 493.480 − (kg − 2) × 41.992
    //   (Gridlines at kg 2–10, major lines at 1 kg intervals)

    const WHO_X_ORIGIN    = 111.130;   // x_svg at week 0 (birth)
    const WHO_PX_PER_WEEK = 23.226;    // svg px per week
    const WHO_WT_Y_AT_2   = 493.480;   // y_svg at 2 kg
    const WHO_WT_PX_PER_KG = 41.992;   // svg px per kg (y decreases as weight increases)

    function who_weeksToX(weeks)  { return WHO_X_ORIGIN  + weeks * WHO_PX_PER_WEEK; }
    function who_weightToY(kg)    { return WHO_WT_Y_AT_2 - (kg - 2) * WHO_WT_PX_PER_KG; }

    // ── Data stores ──────────────────────────────────────────────────────────────
    let who_weightData = [];

    // ── Tooltip ───────────────────────────────────────────────────────────────
    function who_showTooltip(evt, text) {
        const tip = document.getElementById('who-tooltip');
        tip.innerHTML = text;
        tip.style.display = 'block';
        tip.style.left = (evt.pageX + 10) + 'px';
        tip.style.top  = (evt.pageY + 10) + 'px';
    }
    function who_hideTooltip() {
        document.getElementById('who-tooltip').style.display = 'none';
    }

    // ── Generic redraw ────────────────────────────────────────────────────────
    function who_redraw(groupId, data, toY, color, unit) {
        const ns    = 'http://www.w3.org/2000/svg';
        const group = document.getElementById(groupId);
        while (group.firstChild) group.removeChild(group.firstChild);

        const sorted = [...data].sort((a, b) => a.ageWeeks - b.ageWeeks);

        for (let i = 1; i < sorted.length; i++) {
            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', who_weeksToX(sorted[i-1].ageWeeks).toFixed(1));
            line.setAttribute('y1', toY(sorted[i-1].value).toFixed(1));
            line.setAttribute('x2', who_weeksToX(sorted[i].ageWeeks).toFixed(1));
            line.setAttribute('y2', toY(sorted[i].value).toFixed(1));
            line.setAttribute('style', 'stroke:' + color + ';stroke-width:1.5');
            group.appendChild(line);
        }

        for (const pt of sorted) {
            const x      = who_weeksToX(pt.ageWeeks).toFixed(1);
            const y      = toY(pt.value).toFixed(1);
            const months = (pt.ageWeeks / 4.333).toFixed(1);
            const label  = pt.value.toFixed(1).replace('.', ',') + ' ' + unit + '  (' + pt.ageWeeks + ' uker / ~' + months + ' mnd)';
            const circle = document.createElementNS(ns, 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', '4');
            circle.setAttribute('fill', color);
            circle.setAttribute('style', 'cursor:crosshair');
            circle.addEventListener('mousemove', (evt) => who_showTooltip(evt, label));
            circle.addEventListener('mouseout', who_hideTooltip);
            group.appendChild(circle);
        }
    }

    // ── Generic list updater ─────────────────────────────────────────────────
    function who_updateList(listId, data, unit) {
        const el = document.getElementById(listId);
        if (data.length === 0) { el.innerHTML = ''; return; }
        const sorted = [...data].sort((a, b) => a.ageWeeks - b.ageWeeks);
        el.innerHTML = '<strong>Registreringer:</strong><ul style="margin:4px 0;padding-left:16px;">' +
            sorted.map(p => {
                const months = (p.ageWeeks / 4.333).toFixed(1);
                return '<li>' + p.ageWeeks + ' uker: ' + p.value.toFixed(1).replace('.', ',') + ' ' + unit + '</li>';
            }).join('') + '</ul>';
    }

    // ── Weight form handler ───────────────────────────────────────────────────
    document.getElementById('who-weight-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const age = parseFloat(document.getElementById('who-age-weight').value);
        const val = parseFloat(document.getElementById('who-val-weight').value);
        if (isNaN(age) || isNaN(val)) return;
        if (age < 0 || age > 26 || val < 2 || val > 10) return;
        who_weightData.push({ ageWeeks: age, value: val });
        who_redraw('who-weight-data', who_weightData, who_weightToY, 'rgb(220,30,30)', 'kg');
        who_updateList('who-weight-list', who_weightData, 'kg');
        document.getElementById('who-age-weight').value = '';
        document.getElementById('who-val-weight').value = '';
    });

    // ── Patient info ──────────────────────────────────────────────────────────
    document.getElementById('who-patient-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('who-patient-name').value.trim();
        const dob  = document.getElementById('who-patient-dob').value;

        const ns    = 'http://www.w3.org/2000/svg';
        const group = document.getElementById('who-patient-info');
        while (group.firstChild) group.removeChild(group.firstChild);

        function makeTxt(text, x, y) {
            const t = document.createElementNS(ns, 'text');
            t.setAttribute('x', x);
            t.setAttribute('y', y);
            t.setAttribute('font-family', 'sans-serif');
            t.setAttribute('font-size', '9');
            t.setAttribute('fill', '#111');
            t.textContent = text;
            return t;
        }

        if (name) group.appendChild(makeTxt(name, 130, 40));
        if (dob) {
            const [yr, mo, day] = dob.split('-');
            group.appendChild(makeTxt(day + '.' + mo + '.' + yr, 130, 55));
        }
    });
</script>
