<script>
/* Axis calibration
   X: year 4 at x=54, year 19 at x=541.44 => pitch = 32.496 px/yr = 2.708 px/mo
   Y (height): 130 cm at y=371.08, pitch = 5.246 px/cm (y decreases as height increases)
*/
const J419_X0      = 54;
const J419_PX_MO   = 32.496 / 12;
const J419_HT_Y130 = 371.08;
const J419_HT_PX   = 5.246;
// Weight: right y-axis. 0 kg at y=790.74, same px/kg as height px/cm
const J419_WT_Y0   = 790.74;
const J419_WT_PX   = 5.246;

const J419_COL_X   = [76.5, 121.5, 166.5, 211];
const J419_ROW0_Y  = 97.5;
const J419_ROW_H   = 15.0;
const J419_MAX_R   = 10;

const j419_data = [];

function j419_ageToX(mo)  { return J419_X0 + (mo - 48) * J419_PX_MO; }
function j419_htToY(cm)   { return J419_HT_Y130 - (cm - 130) * J419_HT_PX; }
function j419_wtToY(kg)   { return J419_WT_Y0   - kg * J419_WT_PX; }

/* MFH */
document.getElementById('j419-mfh-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const fh = parseFloat(document.getElementById('j419-fh').value);
    const mh = parseFloat(document.getElementById('j419-mh').value);
    if (isNaN(fh) || isNaN(mh)) return;
    const mfh = (fh + mh - 13) / 2;
    const fmt = v => v.toFixed(1).replace('.', ',');
    document.getElementById('j419-mfh-result').textContent =
        'MFH: ' + fmt(mfh) + ' cm  (Malhoyde: ' + fmt(mfh-9) + '–' + fmt(mfh+9) + ' cm)';
    const ns = 'http://www.w3.org/2000/svg';
    const g  = document.getElementById('j419-mfh-values');
    while (g.firstChild) g.removeChild(g.firstChild);
    [[fh,28],[mh,43],[mfh,58]].forEach(([val,y]) => {
        const t = document.createElementNS(ns,'text');
        t.setAttribute('x','231'); t.setAttribute('y',y);
        t.setAttribute('font-family','sans-serif'); t.setAttribute('font-size','5.5');
        t.setAttribute('fill','#7a4a9a'); t.setAttribute('text-anchor','end');
        t.textContent = fmt(val) + ' cm';
        g.appendChild(t);
    });
});

/* Measurements */
document.getElementById('j419-meas-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const age = parseInt(document.getElementById('j419-age').value);
    const ht  = parseFloat(document.getElementById('j419-ht').value);
    const wt  = parseFloat(document.getElementById('j419-wt').value);
    if (isNaN(age) || isNaN(ht)) return;
    if (age < 48 || age > 228 || ht < 90 || ht > 200) return;
    j419_data.push({ age, ht, wt: isNaN(wt) ? null : wt });
    j419_redraw();
    ['j419-age','j419-ht','j419-wt'].forEach(id => { document.getElementById(id).value = ''; });
});

function j419_redraw() {
    const ns = 'http://www.w3.org/2000/svg';
    const sorted = j419_data.slice().sort((a,b) => a.age - b.age);

    /* Height plot */
    const hg = document.getElementById('j419-height-data');
    while (hg.firstChild) hg.removeChild(hg.firstChild);
    if (sorted.length >= 2) {
        for (let i = 1; i < sorted.length; i++) {
            const ln = document.createElementNS(ns,'line');
            ln.setAttribute('x1', j419_ageToX(sorted[i-1].age).toFixed(2));
            ln.setAttribute('y1', j419_htToY(sorted[i-1].ht).toFixed(2));
            ln.setAttribute('x2', j419_ageToX(sorted[i].age).toFixed(2));
            ln.setAttribute('y2', j419_htToY(sorted[i].ht).toFixed(2));
            ln.setAttribute('stroke','rgb(30,100,220)'); ln.setAttribute('stroke-width','1');
            hg.appendChild(ln);
        }
    }
    sorted.forEach(pt => {
        const c = document.createElementNS(ns,'circle');
        c.setAttribute('cx', j419_ageToX(pt.age).toFixed(2));
        c.setAttribute('cy', j419_htToY(pt.ht).toFixed(2));
        c.setAttribute('r','2.5');
        c.setAttribute('fill','rgb(30,100,220)'); c.setAttribute('stroke','white'); c.setAttribute('stroke-width','0.7');
        hg.appendChild(c);
    });

    /* Weight plot */
    const wg = document.getElementById('j419-weight-data');
    while (wg.firstChild) wg.removeChild(wg.firstChild);
    const wpts = sorted.filter(pt => pt.wt != null);
    if (wpts.length >= 2) {
        for (let i = 1; i < wpts.length; i++) {
            const ln = document.createElementNS(ns,'line');
            ln.setAttribute('x1', j419_ageToX(wpts[i-1].age).toFixed(2));
            ln.setAttribute('y1', j419_wtToY(wpts[i-1].wt).toFixed(2));
            ln.setAttribute('x2', j419_ageToX(wpts[i].age).toFixed(2));
            ln.setAttribute('y2', j419_wtToY(wpts[i].wt).toFixed(2));
            ln.setAttribute('stroke','rgb(220,30,30)'); ln.setAttribute('stroke-width','1');
            wg.appendChild(ln);
        }
    }
    wpts.forEach(pt => {
        const c = document.createElementNS(ns,'circle');
        c.setAttribute('cx', j419_ageToX(pt.age).toFixed(2));
        c.setAttribute('cy', j419_wtToY(pt.wt).toFixed(2));
        c.setAttribute('r','2.5');
        c.setAttribute('fill','rgb(220,30,30)'); c.setAttribute('stroke','white'); c.setAttribute('stroke-width','0.7');
        wg.appendChild(c);
    });

    /* Table */
    const tg = document.getElementById('j419-table-data');
    while (tg.firstChild) tg.removeChild(tg.firstChild);
    const fmt = v => v.toFixed(1).replace('.', ',');
    sorted.slice(0, J419_MAX_R).forEach((pt, i) => {
        const y   = J419_ROW0_Y + i * J419_ROW_H;
        const yr  = Math.floor(pt.age / 12);
        const mo  = pt.age % 12;
        const kmi = pt.wt ? pt.wt / Math.pow(pt.ht / 100, 2) : null;
        const vals = [
            yr + 'å' + (mo ? ' ' + mo + 'mnd' : ''),
            pt.wt  ? fmt(pt.wt)  : '',
            fmt(pt.ht),
            kmi ? fmt(kmi) : ''
        ];
        vals.forEach((txt, ci) => {
            if (!txt) return;
            const t = document.createElementNS(ns,'text');
            t.setAttribute('x', J419_COL_X[ci]);
            t.setAttribute('y', y.toFixed(1));
            t.setAttribute('font-family','sans-serif'); t.setAttribute('font-size','4.5');
            t.setAttribute('fill','#111'); t.setAttribute('text-anchor','middle');
            t.setAttribute('dominant-baseline','middle');
            t.textContent = txt;
            tg.appendChild(t);
        });
    });

    /* Sidebar list */
    document.getElementById('j419-meas-list').innerHTML = sorted.map(pt => {
        const yr  = Math.floor(pt.age/12), mo = pt.age%12;
        const kmi = pt.wt ? (pt.wt/Math.pow(pt.ht/100,2)).toFixed(1) : '–';
        return yr + 'å' + (mo ? mo+'mnd' : '') + ': ' + pt.ht.toFixed(1) + ' cm' +
               (pt.wt ? ', ' + pt.wt.toFixed(1) + ' kg' : '') + ', KMI ' + kmi;
    }).join('<br>');
}

/* ── Puberty ─────────────────────────────────────────────────────────── */
// Y-centers derived from SVG band analysis (internal coords → SVG y = 842 - y_int)
const J419_PUB_Y = {
    'B2':       777.5,   // band internal 59.25–69.74  → SVG 782.75–772.26
    'B3':       767.0,   // band internal 69.74–80.23  → SVG 772.26–761.77
    'B4':       756.5,   // band internal 80.23–90.72  → SVG 761.77–751.28
    'P2':       740.8,   // band internal 95.97–106.46 → SVG 746.03–735.54
    'P3':       730.3,   // band internal 106.46–116.95→ SVG 735.54–725.05
    'P4':       719.8,   // band internal 116.95–127.44→ SVG 725.05–714.56
    'menarche': 704.1,   // band internal 132.69–143.18→ SVG 709.31–698.82
};

const j419_puberty = [];  // { age, type }

document.getElementById('j419-puberty-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const age  = parseInt(document.getElementById('j419-pub-age').value);
    const type = document.getElementById('j419-pub-type').value;
    if (isNaN(age) || age < 48 || age > 228) return;
    j419_puberty.push({ age, type });
    j419_drawPuberty();
    document.getElementById('j419-pub-age').value = '';
});

function j419_drawPuberty() {
    const ns = 'http://www.w3.org/2000/svg';
    const g  = document.getElementById('j419-puberty-data');
    while (g.firstChild) g.removeChild(g.firstChild);

    j419_puberty.forEach(pt => {
        const x = j419_ageToX(pt.age);
        const y = J419_PUB_Y[pt.type];
        const c = document.createElementNS(ns, 'circle');
        c.setAttribute('cx', x.toFixed(2));
        c.setAttribute('cy', y.toFixed(2));
        c.setAttribute('r', '3');
        c.setAttribute('fill', 'rgb(200,0,0)');
        c.setAttribute('stroke', 'white');
        c.setAttribute('stroke-width', '0.7');
        g.appendChild(c);
    });

    const labels = { menarche:'Menarche', B2:'B2', B3:'B3', B4:'B4', P2:'P2', P3:'P3', P4:'P4' };
    document.getElementById('j419-puberty-list').innerHTML = j419_puberty
        .slice().sort((a,b) => a.age - b.age)
        .map(pt => {
            const yr = Math.floor(pt.age/12), mo = pt.age%12;
            return labels[pt.type] + ': ' + yr + 'å' + (mo ? mo+'mnd' : '');
        }).join('<br>');
}
