<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vekstkurver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
    }

    nav {
      width: 220px;
      min-width: 220px;
      background: #ffffff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    nav header {
      padding: 20px 16px 14px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      border-bottom: 1px solid #e2e8f0;
    }

    nav ul {
      list-style: none;
      padding: 8px 0;
    }

    nav ul li a {
      display: block;
      padding: 10px 16px;
      text-decoration: none;
      font-size: 14px;
      color: #374151;
      border-left: 3px solid transparent;
      transition: background 0.15s, color 0.15s;
    }

    nav ul li a:hover {
      background: #f1f5f9;
      color: #0f172a;
    }

    nav ul li a.active {
      background: #eff6ff;
      color: #1d4ed8;
      border-left-color: #1d4ed8;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <nav>
    <header>Vekstkurver</header>
    <ul>
      <li><a href="#" data-src="jenter01.html" class="active">Jenter 0 – 1 år</a></li>
      <li><a href="#" data-src="jenter15.html">Jenter 1 – 5 år</a></li>
      <li><a href="#" data-src="jenter419.html">Jenter 4 – 19 år</a></li>
      <li><a href="#" data-src="who/cht-wfa-girls-z-0-6.html">WHO Jenter 0 – 6 mnd (vekt)</a></li>
      <li><a href="#" data-src="height-for-age-chart.html">Turner – høyde 0–18 år</a></li>
      <li><a href="#" data-src="weight-for-age-chart.html">Turner – vekt 0–18 år</a></li>
    </ul>
  </nav>
  <main>
    <iframe id="chart-frame" src="jenter01.html"></iframe>
  </main>

  <script>
    const frame = document.getElementById('chart-frame');
    const links = document.querySelectorAll('nav a[data-src]');

    links.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        frame.src = link.dataset.src;
      });
    });
  </script>
</body>
</html>
